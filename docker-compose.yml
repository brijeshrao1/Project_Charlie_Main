services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      APP_ENV: production
    volumes:
      # Persist uploaded files across restarts
      - uploads:/app/uploads
      # Required data files (read-only)
      - ./Server/Required_files:/app/Required_files:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # ── NLP microservice (Flask + Gunicorn) ────────────────────────────────────
  nlp:
    build:
      context: ./NLP
      dockerfile: Dockerfile
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/charlie_client
      dockerfile: Dockerfile
      args:
        REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY:-}
        REACT_APP_CLERK_JWT_TEMPLATE: ${REACT_APP_CLERK_JWT_TEMPLATE:-charlie tool}
        REACT_APP_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      nlp:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
