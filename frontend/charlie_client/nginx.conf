server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed static assets (JS/CSS/fonts/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy all /api/* requests to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;

        # Forward custom response headers from backend to browser
        add_header Access-Control-Expose-Headers
            "X-Bundle-Filename, Content-Disposition,
             X-Transform-Rules-Applied, X-Transform-Cells-Changed,
             X-Transform-Columns-Changed, X-Transform-Total-Rules" always;
    }

    # Proxy non-prefixed backend routes (e.g. /excel, /convert-excel/)
    location ~ ^/(excel|convert-excel)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Proxy backend-managed static mounts (DAT files, bundles, validation)
    location ~ ^/(static|home|validation_results|bundle_depot_zone)/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
